services:
  # ── PostgreSQL Database ──────────────────────────────
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ledgerai
      POSTGRES_USER: ledgerai
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ledgerai}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ledgerai"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ── LedgerAI Bot ─────────────────────────────────────
  app:
    build: .
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://ledgerai:${DB_PASSWORD:-ledgerai}@db:5432/ledgerai
      DATABASE_URL_SYNC: postgresql+psycopg2://ledgerai:${DB_PASSWORD:-ledgerai}@db:5432/ledgerai
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
